<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>フロアナビ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f5f5f7;
      color: #111;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 28px;
    }
    .badge {
      width: 120px;
      height: 120px;
      border-radius: 999px;
      background: #3b82f6;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(59,130,246,.25);
    }
    .label {
      font-size: 18px;
      color: #666;
      margin-bottom: 8px;
    }
    .place {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .guide {
      font-size: 18px;
      line-height: 1.6;
      color: #333;
      background: #fff;
      padding: 16px 20px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      max-width: 320px;
    }
    .pos {
      margin-top: 12px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">フロアナビ</div>
    <div class="badge">現在地</div>
    <div class="label">現在地</div>
    <div class="place" id="place">読み込み中...</div>
    <div class="guide" id="guide">案内を確認しています…</div>
    <div class="pos" id="pos"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pos = params.get("pos");

    const map = {
      A1: { name: "レジ", guide: "売場の中へ進んでください。" },
      A2: { name: "こども肌着", guide: "次はパジャマ売場方向へ進んでください。" },
      A3: { name: "パジャマ", guide: "次は角へ進んでください。" },
      A4: { name: "角①", guide: "そのまま通路に沿って進んでください。" },
      A5: { name: "角②", guide: "紳士肌着売場はこの先です。" },
      A6: { name: "紳士肌着", guide: "目的地周辺です。" }
    };

    if (pos && map[pos]) {
      document.getElementById("place").innerText = map[pos].name;
      document.getElementById("guide").innerText = map[pos].guide;
      document.getElementById("pos").innerText = "座標：" + pos;
    } else {
      document.getElementById("place").innerText = "位置情報がありません";
      document.getElementById("guide").innerText = "QRコードを読み取って現在地を更新してください。";
    }
  </script>
</body>
</html>

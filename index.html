<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>フロアナビ</title>
</head>
<body>

<h1>フロアナビ</h1>

<p id="place">読み込み中...</p>

<script>
const params = new URLSearchParams(window.location.search);
const pos = params.get("pos");

const map = {
"A1":"レジ",
"A2":"こども肌着",
"A3":"パジャマ",
"A4":"角①",
"A5":"角②",
"A6":"紳士肌着"
};

if(pos && map[pos]){
 document.getElementById("place").innerText = "現在地：" + map[pos];
}else{
 document.getElementById("place").innerText = "位置情報なし";
}
</script>

</body>
</html>

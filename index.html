<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>フロアナビ</title>
  <style>
    :root {
      --bg: #f3f3f3;
      --card: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #d9d9d9;
      --route: #2d7dd2;
      --current: #2d7dd2;
      --dest: #e53935;
      --qr: #f1c94a;

      --zone-pajama: #f3c7c9;
      --zone-kids: #cfdcf7;
      --zone-men: #d5ebd2;
      --zone-season: #ffffff;
      --zone-event: #ffffff;

      --btn-blue: #8cc8f2;
      --btn-orange: #f4a23a;
      --shadow: 0 6px 18px rgba(0,0,0,.12);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }

    .app {
      width: min(100%, 430px);
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 14px 18px;
    }

    .title {
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: .02em;
      margin: 8px 0 14px;
    }

    .map-card {
      background: var(--card);
      border: 1px solid #d8d8d8;
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
      position: relative;
      overflow: hidden;
    }

    .map-wrap {
      position: relative;
      aspect-ratio: 3 / 4.2;
      background: #fafafa;
      border: 2px solid #9e9e9e;
      overflow: hidden;
    }

    /* 通路 */
    .aisle {
      position: absolute;
      background: #eaf6fb;
      border-radius: 10px;
    }

    /* 売場ゾーン */
    .zone {
      position: absolute;
      border-radius: 12px;
      border: 2px solid rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-weight: 700;
      line-height: 1.3;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.6);
    }

    .zone small {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
      color: #444;
    }

    .pajama { background: var(--zone-pajama); }
    .kids { background: var(--zone-kids); }
    .men { background: var(--zone-men); }
    .season, .event {
      background: var(--zone-season);
      border-style: dashed;
      color: #333;
    }

    /* 配置 */
    .z-pajama {
      left: 18px; top: 18px; width: 44%; height: 34%;
    }
    .z-season {
      right: 18px; top: 18px; width: 40%; height: 22%;
    }
    .z-kids {
      right: 18px; top: 27%; width: 40%; height: 16%;
    }
    .z-event {
      left: 18px; bottom: 18px; width: 44%; height: 23%;
    }
    .z-men {
      right: 18px; bottom: 18px; width: 40%; height: 33%;
    }

    .a-top-mid {
      left: 46%; top: 18px; width: 8%; height: 28%;
    }
    .a-mid-h {
      left: 12px; top: 46%; width: calc(100% - 24px); height: 8%;
    }
    .a-center-v {
      left: 47%; top: 46%; width: 6%; height: 42%;
    }
    .a-right-upper {
      right: 18px; top: 22%; width: 40%; height: 8%;
      opacity: 0;
    }

    /* QRポイント */
    .qr-point {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--qr);
      border: 2px solid rgba(0,0,0,.08);
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }

    /* 現在地 */
    .current-pin {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--current);
      box-shadow: 0 0 0 5px rgba(45,125,210,.15);
      z-index: 3;
    }

    .current-label {
      position: absolute;
      z-index: 3;
      font-size: 14px;
      font-weight: 800;
      background: rgba(255,255,255,.92);
      padding: 2px 8px;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      white-space: nowrap;
    }

    .qr-mini {
      position: absolute;
      z-index: 3;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      background:
        linear-gradient(90deg, #000 25%, transparent 25% 50%, #000 50% 75%, transparent 75%),
        linear-gradient(#000 25%, transparent 25% 50%, #000 50% 75%, transparent 75%);
      background-size: 8px 8px;
      background-color: #fff;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.16);
    }

    /* 目的地ピン */
    .dest-pin {
      position: absolute;
      z-index: 3;
      width: 26px;
      height: 26px;
      background: var(--dest);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 3px 10px rgba(0,0,0,.18);
    }
    .dest-pin::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      top: 8px;
      left: 8px;
    }

    .dest-bubble {
      position: absolute;
      z-index: 3;
      background: rgba(255,255,255,.96);
      border-radius: 999px;
      padding: 8px 14px;
      box-shadow: var(--shadow);
      font-size: 24px;
      line-height: 1;
    }

    /* ルート線 */
    .route-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .panel {
      margin-top: 12px;
      background: var(--card);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px 16px 14px;
    }

    .meta {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.4;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .meta .icon {
      width: 28px;
      text-align: center;
      flex: 0 0 28px;
    }

    .guide {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.55;
      margin: 8px 0 8px;
    }

    .help {
      font-size: 14px;
      color: #333;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn.blue { background: var(--btn-blue); color: #fff; }
    .btn.orange { background: var(--btn-orange); color: #fff; }

    .legend {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 360px) {
      .title { font-size: 28px; }
      .meta, .guide { font-size: 16px; }
      .btn { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">フロアナビ</div>

    <div class="map-card">
      <div class="map-wrap" id="map">
        <!-- ゾーン -->
        <div class="zone pajama z-pajama">パジャマ<br><small>👕</small></div>
        <div class="zone season z-season">季節売場</div>
        <div class="zone kids z-kids">こども肌着<br><small>👶</small></div>
        <div class="zone event z-event">催事売場</div>
        <div class="zone men z-men">紳士肌着<br><small>👔</small></div>

        <!-- 通路 -->
        <div class="aisle a-top-mid"></div>
        <div class="aisle a-mid-h"></div>
        <div class="aisle a-center-v"></div>

        <!-- QR設置ポイント -->
        <div class="qr-point" style="left: 8px; top: 43%;"></div>
        <div class="qr-point" style="left: 8px; top: 58%;"></div>
        <div class="qr-point" style="left: 48%; top: 8px;"></div>
        <div class="qr-point" style="left: 48%; bottom: 8px;"></div>
        <div class="qr-point" style="right: 8px; top: 26%;"></div>
        <div class="qr-point" style="right: 8px; top: 43%;"></div>
        <div class="qr-point" style="right: 8px; top: 58%;"></div>
        <div class="qr-point" style="right: 18%; bottom: 8px;"></div>

        <!-- SVG ルート -->
        <svg class="route-layer" viewBox="0 0 100 140" preserveAspectRatio="none">
          <polyline id="routeLine"
            fill="none"
            stroke="#2d7dd2"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-dasharray="0.1 4.2"
            points="">
          </polyline>
        </svg>

        <!-- 現在地 -->
        <div class="current-pin" id="currentPin"></div>
        <div class="qr-mini" id="qrMini"></div>
        <div class="current-label" id="currentLabel">現在地</div>

        <!-- 目的地 -->
        <div class="dest-pin" id="destPin"></div>
        <div class="dest-bubble" id="destBubble">🧦</div>
      </div>

      <div class="legend">🔵 現在地　📍 目的地　🟡 QR設置ポイント</div>
    </div>

    <div class="panel">
      <div class="meta">
        <div class="meta-row">
          <div class="icon">🗺️</div>
          <div>現在地：<span id="currentText">中央通路</span></div>
        </div>
        <div class="meta-row">
          <div class="icon">🧦</div>
          <div>目的地：<span id="destText">靴下売場</span></div>
        </div>
      </div>

      <div class="guide" id="guideText">ここを右に曲がって、進んでください →</div>
      <div class="help">迷ったら近くのQRを読み取ってください</div>

      <div class="buttons">
        <button class="btn blue" type="button">📷 カメラで確認</button>
        <button class="btn orange" type="button">🧊 3Dで確認</button>
      </div>
    </div>
  </div>

  <script>
    // 現在地ポイント（座標は viewBox 100 x 140 基準）
    const posMap = {
      A1: { name: "レジ", x: 50, y: 118 },
      A2: { name: "こども肌着前", x: 50, y: 60 },
      A3: { name: "パジャマ前", x: 50, y: 60 },
      A4: { name: "角①", x: 50, y: 60 },
      A5: { name: "角②", x: 50, y: 60 },
      A6: { name: "紳士肌着前", x: 50, y: 60 }
    };

    // 仮の目的地
    const destinations = {
      socks: {
        name: "靴下売場",
        icon: "🧦",
        pin: { x: 78, y: 20 },
        routeFromA3: {
          points: "50,60 50,20 78,20",
          guide: "ここを右に曲がって、進んでください →"
        }
      },
      register: {
        name: "レジ",
        icon: "🛒",
        pin: { x: 18, y: 118 },
        routeFromA3: {
          points: "50,60 50,92 18,92 18,118",
          guide: "まっすぐ進んで、左へ進んでください ←"
        }
      },
      men: {
        name: "紳士肌着",
        icon: "👔",
        pin: { x: 78, y: 108 },
        routeFromA3: {
          points: "50,60 50,92 78,92 78,108",
          guide: "まっすぐ進んでください ↓"
        }
      }
    };

    const params = new URLSearchParams(window.location.search);
    const pos = params.get("pos") || "A3";
    const dest = params.get("dest") || "socks";

    const current = posMap[pos] || posMap.A3;
    const target = destinations[dest] || destinations.socks;

    // 固定で A3 起点の試作
    const routeData = target.routeFromA3;

    function setMapElementPosition(el, x, y, offsetX = 0, offsetY = 0) {
      el.style.left = `calc(${x}% + ${offsetX}px)`;
      el.style.top = `calc(${y / 140 * 100}% + ${offsetY}px)`;
    }

    const currentPin = document.getElementById("currentPin");
    const qrMini = document.getElementById("qrMini");
    const currentLabel = document.getElementById("currentLabel");
    const destPin = document.getElementById("destPin");
    const destBubble = document.getElementById("destBubble");

    // 現在地
    setMapElementPosition(currentPin, current.x, current.y, -9, -9);
    setMapElementPosition(qrMini, current.x, current.y, 10, -8);
    setMapElementPosition(currentLabel, current.x, current.y, 8, 8);

    // 目的地
    setMapElementPosition(destPin, target.pin.x, target.pin.y, -13, -13);
    setMapElementPosition(destBubble, target.pin.x, target.pin.y, -8, -56);
    destBubble.textContent = target.icon;

    // 文言
    document.getElementById("currentText").textContent = current.name;
    document.getElementById("destText").textContent = target.name;
    document.getElementById("guideText").textContent = routeData.guide;

    // ルート
    document.getElementById("routeLine").setAttribute("points", routeData.points);
  </script>
</body>
</html>
